name: Build & Release Foundry Module
on:
  workflow_dispatch:
  push:
    tags: [ "foundry-module-v*" ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build foundry module
        run: npm run build:foundry

      - name: Create module zip
        run: |
          mkdir -p /tmp/foundry-mcp-bridge
          cp -r packages/foundry-module/. /tmp/foundry-mcp-bridge/
          rm -rf /tmp/foundry-mcp-bridge/node_modules /tmp/foundry-mcp-bridge/src /tmp/foundry-mcp-bridge/tsconfig.json
          cd /tmp
          zip -r $GITHUB_WORKSPACE/foundry-vtt-mcp.zip foundry-mcp-bridge/ -x "foundry-mcp-bridge/.*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: foundry-vtt-mcp.zip
          generate_release_notes: true